{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <title>Inscription - Digitalisation DTV</title>
    <link rel="icon" href="{% static 'images/logo.jpg' %}">
    <link rel="stylesheet" href="{% static 'assets/css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'assets/css/atlantis.min.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .register-wrapper {
            width: 100%;
            max-width: 520px;
        }
        .card-register {
            border: none;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            overflow: hidden;
        }
        .card-register .card-header {
            background: linear-gradient(135deg, #1572e8, #1a73e8);
            border-bottom: none;
            padding: 35px 30px 20px;
            text-align: center;
        }
        .card-register .card-body {
            padding: 30px;
        }
        .logo-circle {
            width: 75px;
            height: 75px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
            border: 3px solid rgba(255, 255, 255, 0.3);
        }
        .logo-circle img {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
        }
        .card-register .card-header h3 {
            color: #fff;
            font-weight: 700;
            margin-bottom: 3px;
            font-size: 22px;
        }
        .card-register .card-header p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 13px;
            margin-bottom: 0;
        }
        .form-group label {
            font-weight: 600;
            font-size: 13px;
            color: #525f7f;
            margin-bottom: 5px;
        }
        .form-control {
            border-radius: 10px;
            padding: 11px 15px;
            height: auto;
            border: 1.5px solid #e0e0e0;
            font-size: 14px;
            transition: all 0.3s;
        }
        .form-control:focus {
            border-color: #1572e8;
            box-shadow: 0 0 0 3px rgba(21, 114, 232, 0.12);
        }
        .input-group-icon {
            position: relative;
        }
        .input-group-icon .form-control {
            padding-left: 40px;
        }
        .input-group-icon .input-icon {
            position: absolute;
            left: 13px;
            top: 50%;
            transform: translateY(-50%);
            color: #adb5bd;
            font-size: 15px;
            z-index: 4;
        }
        .btn-register {
            border-radius: 10px;
            padding: 12px;
            font-weight: 700;
            font-size: 15px;
            background: linear-gradient(135deg, #1572e8, #1a73e8);
            border: none;
            transition: all 0.3s;
        }
        .btn-register:hover {
            background: linear-gradient(135deg, #1266be, #1557b0);
            transform: translateY(-1px);
            box-shadow: 0 7px 20px rgba(21, 114, 232, 0.35);
        }
        .divider-text {
            display: flex;
            align-items: center;
            margin: 18px 0;
        }
        .divider-text::before,
        .divider-text::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #e9ecef;
        }
        .divider-text span {
            padding: 0 15px;
            color: #adb5bd;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }
        .alert-custom {
            border-radius: 10px;
            border-left: 4px solid;
            font-size: 14px;
        }
        .alert-custom.alert-danger {
            border-left-color: #f5365c;
        }
    </style>
</head>
<body>
    <div class="register-wrapper">
        <div class="card card-register">
            <div class="card-header">
                <div class="logo-circle">
                    <img src="{% static 'images/logo.jpg' %}" alt="AFOR">
                </div>
                <h3>Créer un compte</h3>
                <p>Digitalisation DTV &mdash; AFOR</p>
            </div>
            <div class="card-body">
                {% if error %}
                    <div class="alert alert-danger alert-custom alert-dismissible fade show" role="alert">
                        <i class="fas fa-exclamation-circle mr-2"></i> {{ error }}
                        <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                            <span aria-hidden="true">&times;</span>
                        </button>
                    </div>
                {% endif %}

                <form method="post">
                    {% csrf_token %}
                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group">
                                <label for="nom">Nom</label>
                                <div class="input-group-icon">
                                    <span class="input-icon"><i class="fas fa-user"></i></span>
                                    <input type="text" class="form-control" id="nom" name="nom"
                                           placeholder="Votre nom" required>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label for="prenom">Prénom</label>
                                <div class="input-group-icon">
                                    <span class="input-icon"><i class="fas fa-user"></i></span>
                                    <input type="text" class="form-control" id="prenom" name="prenom"
                                           placeholder="Votre prénom">
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="username">Nom d'utilisateur</label>
                        <div class="input-group-icon">
                            <span class="input-icon"><i class="fas fa-id-badge"></i></span>
                            <input type="text" class="form-control" id="username" name="username"
                                   placeholder="Choisissez un nom d'utilisateur" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="email">Adresse email</label>
                        <div class="input-group-icon">
                            <span class="input-icon"><i class="fas fa-envelope"></i></span>
                            <input type="email" class="form-control" id="email" name="email"
                                   placeholder="votre@email.com">
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group">
                                <label for="password">Mot de passe</label>
                                <div class="input-group-icon">
                                    <span class="input-icon"><i class="fas fa-lock"></i></span>
                                    <input type="password" class="form-control" id="password" name="password"
                                           placeholder="Mot de passe" required>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label for="password_confirm">Confirmer</label>
                                <div class="input-group-icon">
                                    <span class="input-icon"><i class="fas fa-check-circle"></i></span>
                                    <input type="password" class="form-control" id="password_confirm"
                                           name="password_confirm" placeholder="Confirmer" required>
                                </div>
                            </div>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block btn-register">
                        <i class="fas fa-user-plus mr-2"></i> S'inscrire
                    </button>
                </form>

                <div class="divider-text">
                    <span>Déjà inscrit ?</span>
                </div>
                <a href="{% url 'connexion' %}" class="btn btn-outline-primary btn-block"
                   style="border-radius: 10px; padding: 10px; font-weight: 600; font-size: 14px;">
                    <i class="fas fa-sign-in-alt mr-2"></i> Se connecter
                </a>
            </div>
        </div>
        <div class="text-center mt-3">
            <small class="text-white-50">&copy; 2026 AFOR &mdash; Agence Foncière Rurale. Tous droits réservés.</small>
        </div>
    </div>

    <script src="{% static 'assets/js/core/jquery.3.2.1.min.js' %}"></script>
    <script src="{% static 'assets/js/core/popper.min.js' %}"></script>
    <script src="{% static 'assets/js/core/bootstrap.min.js' %}"></script>
</body>
</html>
