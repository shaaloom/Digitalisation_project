{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <title>Connexion - Digitalisation DTV</title>
    <link rel="icon" href="{% static 'images/logo.jpg' %}">
    <link rel="stylesheet" href="{% static 'assets/css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'assets/css/atlantis.min.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-wrapper {
            width: 100%;
            max-width: 420px;
        }
        .card-login {
            border: none;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            overflow: hidden;
        }
        .card-login .card-header {
            background: linear-gradient(135deg, #1572e8, #1a73e8);
            border-bottom: none;
            padding: 40px 30px 25px;
            text-align: center;
        }
        .card-login .card-body {
            padding: 35px 30px;
        }
        .logo-circle {
            width: 85px;
            height: 85px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            border: 3px solid rgba(255, 255, 255, 0.3);
        }
        .logo-circle img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
        }
        .card-login .card-header h3 {
            color: #fff;
            font-weight: 700;
            margin-bottom: 5px;
        }
        .card-login .card-header p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            margin-bottom: 0;
        }
        .form-group label {
            font-weight: 600;
            font-size: 13px;
            color: #525f7f;
            margin-bottom: 6px;
        }
        .form-control {
            border-radius: 10px;
            padding: 12px 15px;
            height: auto;
            border: 1.5px solid #e0e0e0;
            font-size: 14px;
            transition: all 0.3s;
        }
        .form-control:focus {
            border-color: #1572e8;
            box-shadow: 0 0 0 3px rgba(21, 114, 232, 0.12);
        }
        .input-group-icon {
            position: relative;
        }
        .input-group-icon .form-control {
            padding-left: 42px;
        }
        .input-group-icon .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #adb5bd;
            font-size: 16px;
            z-index: 4;
        }
        .btn-login {
            border-radius: 10px;
            padding: 12px;
            font-weight: 700;
            font-size: 15px;
            background: linear-gradient(135deg, #1572e8, #1a73e8);
            border: none;
            transition: all 0.3s;
        }
        .btn-login:hover {
            background: linear-gradient(135deg, #1266be, #1557b0);
            transform: translateY(-1px);
            box-shadow: 0 7px 20px rgba(21, 114, 232, 0.35);
        }
        .divider-text {
            display: flex;
            align-items: center;
            margin: 20px 0;
        }
        .divider-text::before,
        .divider-text::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #e9ecef;
        }
        .divider-text span {
            padding: 0 15px;
            color: #adb5bd;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }
        .alert-custom {
            border-radius: 10px;
            border-left: 4px solid;
            font-size: 14px;
        }
        .alert-custom.alert-danger {
            border-left-color: #f5365c;
        }
        .form-check-label {
            font-size: 13px;
            color: #8898aa;
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="card card-login">
            <div class="card-header">
                <div class="logo-circle">
                    <img src="{% static 'images/logo.jpg' %}" alt="AFOR">
                </div>
                <h3>Digitalisation DTV</h3>
                <p>Connectez-vous à votre espace</p>
            </div>
            <div class="card-body">
                {% if error %}
                    <div class="alert alert-danger alert-custom alert-dismissible fade show" role="alert">
                        <i class="fas fa-exclamation-circle mr-2"></i> {{ error }}
                        <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                            <span aria-hidden="true">&times;</span>
                        </button>
                    </div>
                {% endif %}

                <form method="post">
                    {% csrf_token %}
                    <div class="form-group">
                        <label for="username">Nom d'utilisateur</label>
                        <div class="input-group-icon">
                            <span class="input-icon"><i class="fas fa-user"></i></span>
                            <input type="text" class="form-control" id="username" name="username"
                                   placeholder="Entrez votre nom d'utilisateur"
                                   value="{{ username|default:'' }}" required autofocus>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="password">Mot de passe</label>
                        <div class="input-group-icon">
                            <span class="input-icon"><i class="fas fa-lock"></i></span>
                            <input type="password" class="form-control" id="password" name="password"
                                   placeholder="Entrez votre mot de passe" required>
                        </div>
                    </div>
                    <div class="form-group d-flex justify-content-between align-items-center">
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input" id="remember">
                            <label class="form-check-label" for="remember">Se souvenir de moi</label>
                        </div>
                        <a href="#" class="text-primary small font-weight-bold">Mot de passe oublié ?</a>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block btn-login">
                        <i class="fas fa-sign-in-alt mr-2"></i> Connexion
                    </button>
                </form>

                <div class="divider-text">
                    <span>Nouveau ?</span>
                </div>
                <a href="{% url 'inscription' %}" class="btn btn-outline-primary btn-block btn-rounded"
                   style="border-radius: 10px; padding: 10px; font-weight: 600; font-size: 14px;">
                    <i class="fas fa-user-plus mr-2"></i> Créer un compte
                </a>
            </div>
        </div>
        <div class="text-center mt-3">
            <small class="text-white-50">&copy; 2026 AFOR &mdash; Agence Foncière Rurale. Tous droits réservés.</small>
        </div>
    </div>

    <script src="{% static 'assets/js/core/jquery.3.2.1.min.js' %}"></script>
    <script src="{% static 'assets/js/core/popper.min.js' %}"></script>
    <script src="{% static 'assets/js/core/bootstrap.min.js' %}"></script>
</body>
</html>
